name: MNNSR-Linux
on:
  # push:
  #   branches: [ master ]
  # pull_request:
  #   branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        include:
          - image: ubuntu:20.04
            sysname: ubuntu20
            cuda: "11.8.0"
          - image: ubuntu:20.04
            sysname: ubuntu20
            cuda: "12.2.0"
          - image: ubuntu:22.04
            sysname: ubuntu22
            cuda: "11.8.0"
          - image: ubuntu:22.04
            sysname: ubuntu22
            cuda: "12.3.0"
          - image: ubuntu:24.04
            sysname: ubuntu24
            cuda: "11.8.0"
          - image: ubuntu:24.04
            sysname: ubuntu24
            cuda: "12.3.0"
          - image: ubuntu:24.04
            sysname: ubuntu24
            cuda: "12.6.3"
          - image: debian:bullseye
            sysname: debian
            cuda: "10.2.89"
          - image: debian:bullseye
            sysname: debian
            cuda: "12.2.0"

    container:
      image: ${{ matrix.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies (Debian/Ubuntu)
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          pwd
          apt-get update
          apt-get install -y build-essential unzip cmake git wget libopencv-dev ocl-icd-opencl-dev clinfo libvulkan-dev vulkan-tools
        working-directory: 3rdparty
          
      - name: Clone 3rdparty
        run: |
          # 安装命令
          git clone https://github.com/webmproject/libwebp  --depth 1
          git clone https://github.com/alibaba/MNN --depth 1
          # wget https://github.com/alibaba/MNN/releases/download/3.1.0/mnn_3.1.0_linux_x64_cpu_opencl.zip; unzip mnn_3.1.0_linux_x64_cpu_opencl.zip ; mv mnn_3.1.0_linux_x64_cpu_opencl mnn_linux_x64;
          # cp MNN/include  mnn_linux_x64/
          wget https://github.com/Tencent/ncnn/releases/download/20250503/ncnn-20250503-ubuntu-2404-shared.zip; unzip ncnn-20250503-ubuntu-2404-shared.zip ; mv ncnn-20250503-ubuntu-2404-shared  ncnn-ubuntu-shared
        working-directory: 3rdparty

      - name: Modify CMakeLists.txt for RPATH
        run: |
          echo "Modifying CMakeLists.txt to add RPATH settings..."
          sed -i.bak '/target_link_libraries(MNN PUBLIC -pthread dl)/a \
            set_target_properties(MNN PROPERTIES\
                BUILD_RPATH "$ORIGIN/lib"\
            )
          ' CMakeLists.txt
          echo "--- Verification: Content after modification ---"
          grep -C 5 "target_link_libraries(MNN PUBLIC -pthread dl)" CMakeLists.txt
        working-directory: 3rdparty/MNN


      - name: Set up CUDA ${{ matrix.cuda }}
        uses: Jimver/cuda-toolkit@v0.2.23
        with:
          cuda: ${{ matrix.cuda }}

      - name: build mnn
        run: |
          mkdir build ;cd build; cmake ..  -DCMAKE_BUILD_TYPE=Release -DMNN_TENSORRT=OFF -DMNN_OPENGL=ON  -DMNN_OPENCL=OFF  -DMNN_VULKAN=ON  -DMNN_CUDA=ON  -DMNN_SEP_BUILD=OFF  && make -j$(nproc)
          pwd;mkdir libs ;  cd build; cp -v $(find . -name "libMNN*.so") ../libs/ ; ls -lh ../libs/
        working-directory: 3rdparty/MNN
        
      - name: build mnnsr
        run: |
          mkdir build ;cd build; cmake .. && make -j$(nproc)
          cp ../../../../../../3rdparty/MNN/libs/* build/  ; cd build ; chmod 777 *;ls -lh
        working-directory: RealSR-NCNN-Android-CLI/MNN-SR/src/main/jni

        
      - name: Package artifacts
        run: |
          mkdir -p mnnsr/lib
          cp build/*.so mnnsr/lib/ ;cp build/mnnsr-ncnn mnnsr/
          ldd mnnsr/lib/libMNN.so | grep "=>" | awk '{print $3}' | xargs -I {} cp {} mnnsr/lib/
          ldd mnnsr/mnnsr-ncnn | grep "=>" | awk '{print $3}' | xargs -I {} cp {} mnnsr/lib/
          # patchelf --set-rpath '$ORIGIN/../lib' mnnsr/mnnsr-ncnn
          tar -czvf mnnsr.tar.gz mnnsr
        working-directory: RealSR-NCNN-Android-CLI/MNN-SR/src/main/jni

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mnnsr-${{ matrix.sysname }}-cuda${{ matrix.cuda }}
          path: RealSR-NCNN-Android-CLI/MNN-SR/src/main/jni/mnnsr/*
